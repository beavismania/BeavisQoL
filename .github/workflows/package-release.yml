name: Package Release Zip

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build addon zip
        shell: bash
        run: |
          mkdir -p release
          git archive --format=zip --output release/BeavisQoL.zip --prefix BeavisQoL/ HEAD

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeavisQoL-package
          path: release/BeavisQoL.zip
          if-no-files-found: error

      - name: Upload zip to GitHub release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" "release/BeavisQoL.zip" --clobber
